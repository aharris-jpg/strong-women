<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Strongest Women Visual</title>
  <style>
    body {
      background:#0f1720;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:sans-serif;
    }

    .image-frame {
      padding:12px;
      background:#111827;
      border:1px solid rgba(255,255,255,0.08);
      border-radius:18px;
      box-shadow:0 25px 60px rgba(0,0,0,0.5);
    }

    .image-frame img {
      display:block;
      max-width:700px;
      border-radius:14px;
    }
  </style>
</head>
<body>

  <div class="image-frame">
    <img src="https://images.unsplash.com/photo-1651525156757-f868c834a56e?q=80&w=1770&auto=format&fit=crop" alt="Woman stretching outdoors">
  </div>

</body>
</html>
