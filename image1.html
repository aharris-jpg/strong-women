<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Strongest Women Visual</title>
  <style>
    body {
      margin:0;
      padding:40px 0;
      background:#ffffff;
      display:flex;
      justify-content:center;
      font-family:sans-serif;
    }

    .image-frame {
      max-width:900px;
      padding:10px;
      background:#ffffff;
      border:1px solid rgba(0,0,0,0.08);
      border-radius:14px;
      box-shadow:0 12px 30px rgba(0,0,0,0.08);
    }

    .image-frame img {
      display:block;
      width:100%;
      border-radius:10px;
    }

    .caption {
      margin-top:10px;
      font-size:14px;
      color:#666;
      line-height:1.4;
      text-align:center;
    }
  </style>
</head>
<body>

  <div class="image-frame">
    <img src="https://images.unsplash.com/photo-1651525156757-f868c834a56e?q=80&w=1770&auto=format&fit=crop" alt="Woman stretching outdoors">
    <div class="caption">
      Physical activity is one of the three pillars used to measure the Strongest Women in America Index.
    </div>
  </div>

</body>
</html>
